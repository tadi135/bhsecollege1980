<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty & Staff | BHSRC Degree & Junior College</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="site-header"></div>
  <section class="breadcrumb-section"><div class="container">
    <h1>Faculty & Staff</h1>
    <div class="breadcrumb"><a href="index.html">Home</a><span>›</span><span>Faculty & Staff</span></div>
  </div></section>

  <section class="section">
    <div class="container">
      <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-bottom:36px;">
        <button class="btn btn-navy btn-sm" onclick="filterStaff('all',this)">All Staff</button>
        <button class="btn btn-sm" style="border:2px solid var(--navy);color:var(--navy);" onclick="filterStaff('principal',this)">Leadership</button>
        <button class="btn btn-sm" style="border:2px solid var(--navy);color:var(--navy);" onclick="filterStaff('faculty',this)">Faculty</button>
        <button class="btn btn-sm" style="border:2px solid var(--navy);color:var(--navy);" onclick="filterStaff('admin',this)">Administrative</button>
      </div>
      <div class="grid-4" id="staffGrid">
        <div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
  <script>
    let allStaff = [];

    function filterStaff(role, btn) {
      document.querySelectorAll('[onclick^=filterStaff]').forEach(b => { b.style.background='transparent'; b.style.color='var(--navy)'; });
      btn.style.background='var(--navy)'; btn.style.color='white';
      renderStaff(role === 'all' ? allStaff : allStaff.filter(s => s.role === role));
    }

    function renderStaff(list) {
      const g = document.getElementById('staffGrid');
      if (!list.length) {
        const fallback = [
          {name:'Dr. K. Venkata Rao', designation:'Principal', department:'Management', role:'principal'},
          {name:'Dr. S. Lakshmi Devi', designation:'Vice Principal', department:'Management', role:'principal'},
          {name:'Prof. A. Ramesh', designation:'HOD - Mathematics', department:'Mathematics', role:'faculty'},
          {name:'Dr. P. Sailaja', designation:'HOD - Biology', department:'Biology', role:'faculty'},
          {name:'Prof. T. Kumar', designation:'Senior Lecturer', department:'Commerce', role:'faculty'},
          {name:'Dr. N. Reddy', designation:'HOD - Physics', department:'Physics', role:'faculty'},
          {name:'Mr. R. Sharma', designation:'Office Superintendent', department:'Administration', role:'admin'},
          {name:'Mrs. K. Priya', designation:'Librarian', department:'Library', role:'admin'},
        ];
        renderStaff(fallback); return;
      }
      g.innerHTML = list.map(s => `
        <div style="background:var(--white); border-radius:var(--radius-lg); box-shadow:var(--shadow-md); overflow:hidden; text-align:center; transition:var(--transition);"
          onmouseenter="this.style.transform='translateY(-4px)'; this.style.boxShadow='var(--shadow-xl)';"
          onmouseleave="this.style.transform='none'; this.style.boxShadow='var(--shadow-md)';">
          <div style="background:linear-gradient(135deg,var(--navy),var(--navy-light)); height:130px; display:flex; align-items:center; justify-content:center; font-size:3.5rem; position:relative;">
            ${s.image_url
              ? `<img src="${s.image_url}" alt="${s.name}" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);">`
              : `<div style="width:90px;height:90px;border-radius:50%;background:rgba(200,150,12,0.2);border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:2.5rem;">${s.role==='principal'?'👤':'🎓'}</div>`
            }
            <div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--navy);font-size:9px;font-weight:700;padding:2px 10px;border-radius:10px;white-space:nowrap;">${s.role?.toUpperCase()}</div>
          </div>
          <div style="padding:16px 14px;">
            <div style="font-family:var(--font-serif);font-weight:700;color:var(--navy);margin-bottom:4px;font-size:0.95rem;">${s.name}</div>
            <div style="color:var(--gold);font-size:12px;font-weight:600;margin-bottom:4px;">${s.designation}</div>
            ${s.department ? `<div style="color:var(--gray-500);font-size:12px;">${s.department}</div>` : ''}
            ${s.qualification ? `<div style="color:var(--gray-500);font-size:11px;margin-top:4px;">${s.qualification}</div>` : ''}
            ${s.email ? `<a href="mailto:${s.email}" style="display:block;font-size:11px;color:var(--navy);margin-top:6px;opacity:0.7;">✉ ${s.email}</a>` : ''}
          </div>
        </div>
      `).join('');
    }

    async function pageInit() {
      const res = await apiFetch('/staff');
      allStaff = res.data || [];
      renderStaff(allStaff);
    }
  </script>
</body>
</html>
