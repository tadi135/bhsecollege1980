<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Companies | College Admin</title><link rel="stylesheet" href="css/admin.css"></head>
<body><script src="js/config.js"></script>
<script src="js/admin.js"></script><script>
let items=[];
document.addEventListener('DOMContentLoaded',async()=>{
  buildLayout('Recruiter Companies',`
    <div class="page-header"><h2>Manage Recruiter Companies</h2><button onclick="openAdd()" class="topbar-btn btn-primary">+ Add Company</button></div>
    <div class="card"><div class="table-wrap"><table><thead><tr><th>Logo</th><th>Company Name</th><th>Website</th><th>Order</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody id="tbl"></tbody></table></div></div>`);
  await load();
});
async function load(){const r=await adminAPI('/admin/companies');items=r?.data||[];render();}
function render(){document.getElementById('tbl').innerHTML=items.length?items.map(c=>`<tr>
  <td>${c.logo_url?`<img src="http://localhost:3000${c.logo_url}" style="height:32px;object-fit:contain;max-width:80px;">`:'<span style="font-size:1.5rem;">🏢</span>'}</td>
  <td style="font-weight:600;">${c.name}</td>
  <td style="font-size:12px;">${c.website?`<a href="${c.website}" target="_blank" style="color:var(--navy);">${c.website}</a>`:'-'}</td>
  <td><input type="number" value="${c.order_index}" onchange="updateOrder(${c.id},this.value)" style="width:60px;" class="form-control"></td>
  <td><label class="switch"><input type="checkbox" ${c.active?'checked':''} onchange="toggleActive(${c.id},this.checked)"><span class="slider-track"></span></label></td>
  <td><div class="td-actions"><button class="btn-edit" onclick="openEdit(${c.id})">✏️</button><button class="btn-del" onclick="del(${c.id})">🗑</button></div></td>
</tr>`).join(''):'<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--gray-400);">No companies yet.</td></tr>';}
function form(c={}){return`<div class="form-grid">
  <div class="form-group"><label class="form-label">Company Name *</label><input class="form-control" id="cName" value="${c.name||''}" required></div>
  <div class="form-group"><label class="form-label">Website URL</label><input class="form-control" id="cWeb" value="${c.website||''}" placeholder="https://company.com"></div>
  <div class="form-group form-full"><label class="form-label">Logo Image URL</label><input class="form-control" id="cLogo" value="${c.logo_url||''}" placeholder="/uploads/company-logo.png"></div>
  <div class="form-group"><label class="form-label">Display Order</label><input type="number" class="form-control" id="cOrder" value="${c.order_index||0}"></div>
</div>`;}
function openAdd(){openModal('Add Company',form(),async()=>{
  const d={name:document.getElementById('cName').value,website:document.getElementById('cWeb').value,logo_url:document.getElementById('cLogo').value,order_index:document.getElementById('cOrder').value};
  if(!d.name){toast('Company name required','error');return;}
  const r=await adminAPI('/admin/companies',{method:'POST',body:JSON.stringify(d)});
  if(r?.success){toast('Company added!','success');closeModal();await load();}else toast('Failed','error');
},'Add');}
function openEdit(id){const c=items.find(x=>x.id===id);if(!c)return;
openModal('Edit Company',form(c),async()=>{
  const d={name:document.getElementById('cName').value,website:document.getElementById('cWeb').value,logo_url:document.getElementById('cLogo').value,order_index:document.getElementById('cOrder').value};
  const r=await adminAPI(`/admin/companies/${id}`,{method:'PUT',body:JSON.stringify(d)});
  if(r?.success){toast('Updated!','success');closeModal();await load();}else toast('Failed','error');
},'Save');}
async function toggleActive(id,v){await adminAPI(`/admin/companies/${id}`,{method:'PUT',body:JSON.stringify({active:v?1:0})});}
async function updateOrder(id,v){await adminAPI(`/admin/companies/${id}`,{method:'PUT',body:JSON.stringify({order_index:parseInt(v)})});}
async function del(id){if(!await confirm('Delete this company?'))return;const r=await adminAPI(`/admin/companies/${id}`,{method:'DELETE'});if(r?.success){toast('Deleted','success');await load();}else toast('Failed','error');}
</script></body></html>
