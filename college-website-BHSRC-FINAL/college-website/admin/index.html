<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | College Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <script src="js/config.js"></script>
<script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      buildLayout('Dashboard', `
        <div class="stats-row" id="statsRow">
          ${Array(8).fill('<div class="stat-card" style="animation:pulse 1.5s infinite;"><div class="stat-icon" style="background:#f1f5f9;">⌛</div><div><div class="stat-num">...</div><div class="stat-label">Loading</div></div></div>').join('')}
        </div>
        <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-top:4px;">
          <div class="card">
            <div class="card-header"><span class="card-title">Recent Enquiries</span><a href="enquiries.html" style="font-size:12px;color:var(--navy);text-decoration:none;">View All →</a></div>
            <div id="recentEnquiries" style="padding:0;"><div style="padding:24px;text-align:center;color:var(--gray-400);">Loading...</div></div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Recent News</span><a href="news.html" style="font-size:12px;color:var(--navy);text-decoration:none;">Manage →</a></div>
            <div id="recentNews" style="padding:0;"><div style="padding:24px;text-align:center;color:var(--gray-400);">Loading...</div></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
          <div class="card">
            <div class="card-header"><span class="card-title">Quick Actions</span></div>
            <div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
              ${[
                {href:'sliders.html', icon:'🖼️', label:'Add Slider'},
                {href:'news.html', icon:'📰', label:'Add News'},
                {href:'placements.html', icon:'💼', label:'Add Placement'},
                {href:'staff.html', icon:'👨‍🏫', label:'Add Staff'},
                {href:'gallery.html', icon:'📸', label:'Upload Gallery'},
                {href:'companies.html', icon:'🏢', label:'Add Company'},
                {href:'departments.html', icon:'📚', label:'Add Department'},
                {href:'college-info.html', icon:'🏛️', label:'Update Info'},
              ].map(a=>`<a href="${a.href}" style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--gray-50);border-radius:8px;color:var(--gray-700);font-size:13px;font-weight:500;text-decoration:none;border:1px solid var(--gray-200);transition:0.2s;" onmouseenter="this.style.background='#e2e8f0'" onmouseleave="this.style.background='var(--gray-50)'"><span>${a.icon}</span>${a.label}</a>`).join('')}
            </div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">College Info Preview</span><a href="college-info.html" style="font-size:12px;color:var(--navy);text-decoration:none;">Edit →</a></div>
            <div id="collegePreview" class="card-body" style="font-size:13px;color:var(--gray-600);line-height:2;">Loading...</div>
          </div>
        </div>
      `);

      // Load stats
      const statsRes = await adminAPI('/admin/dashboard-stats');
      if (statsRes?.success) {
        const d = statsRes.data;
        const statItems = [
          {icon:'📰', label:'News & Events', val:d.news, color:'#eff6ff'},
          {icon:'🖼️', label:'Sliders', val:d.sliders, color:'#fef9c3'},
          {icon:'👨‍🏫', label:'Staff Members', val:d.staff, color:'#f0fdf4'},
          {icon:'💼', label:'Placements', val:d.placements, color:'#fdf2f8'},
          {icon:'🏢', label:'Companies', val:d.companies, color:'#fff7ed'},
          {icon:'📸', label:'Gallery Items', val:d.gallery, color:'#f0f9ff'},
          {icon:'📩', label:'Total Enquiries', val:d.enquiries, color:'#fef2f2'},
          {icon:'🔔', label:'New Enquiries', val:d.newEnquiries, color:'#fff0f0'},
        ];
        document.getElementById('statsRow').innerHTML = statItems.map(s => `
          <div class="stat-card" style="border-top-color:var(--navy);">
            <div class="stat-icon" style="background:${s.color};font-size:1.4rem;">${s.icon}</div>
            <div><div class="stat-num">${s.val}</div><div class="stat-label">${s.label}</div></div>
          </div>
        `).join('');
      }

      // Load enquiries
      const enqRes = await adminAPI('/admin/enquiries');
      const enquiries = (enqRes?.data || []).slice(0, 5);
      document.getElementById('recentEnquiries').innerHTML = enquiries.length ? `
        <table><thead><tr><th>Name</th><th>Phone</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>
          ${enquiries.map(e => `
            <tr>
              <td><div style="font-weight:600;">${e.name}</div><div style="font-size:11px;color:var(--gray-400);">${e.email||''}</div></td>
              <td>${e.phone||'-'}</td>
              <td><span class="badge ${e.status==='new'?'badge-red':'badge-green'}">${e.status}</span></td>
              <td style="font-size:12px;">${fmtDate(e.created_at)}</td>
            </tr>
          `).join('')}
        </tbody></table>
      ` : '<div style="padding:24px;text-align:center;color:var(--gray-400);">No enquiries yet</div>';

      // Load news
      const newsRes = await adminAPI('/admin/news');
      const news = (newsRes?.data || []).slice(0, 5);
      document.getElementById('recentNews').innerHTML = news.length ? `
        <table><thead><tr><th>Title</th><th>Category</th><th>Status</th></tr></thead>
        <tbody>
          ${news.map(n => `
            <tr>
              <td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n.title}</td>
              <td><span class="badge badge-blue">${n.category}</span></td>
              <td><span class="badge ${n.active?'badge-green':'badge-gray'}">${n.active?'Active':'Hidden'}</span></td>
            </tr>
          `).join('')}
        </tbody></table>
      ` : '<div style="padding:24px;text-align:center;color:var(--gray-400);">No news yet</div>';

      // College info preview
      const infoRes = await adminAPI('/admin/college-info');
      if (infoRes?.success) {
        const i = infoRes.data;
        document.getElementById('collegePreview').innerHTML = `
          <div><strong>Name:</strong> ${i.college_name||'-'}</div>
          <div><strong>Principal:</strong> ${i.principal_name||'-'}</div>
          <div><strong>Phone:</strong> ${i.phone1||'-'}</div>
          <div><strong>Email:</strong> ${i.email1||'-'}</div>
          <div><strong>NAAC Grade:</strong> ${i.naac_grade||'-'}</div>
          <div><strong>Est.:</strong> ${i.established||'-'}</div>
        `;
      }
    });
  </script>
</body>
</html>
