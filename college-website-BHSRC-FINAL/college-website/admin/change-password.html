<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password | College Admin</title><link rel="stylesheet" href="css/admin.css"></head>
<body><script src="js/config.js"></script>
<script src="js/admin.js"></script><script>
document.addEventListener('DOMContentLoaded',()=>{
  buildLayout('Change Password',`
    <div style="max-width:480px;">
      <div class="card">
        <div class="card-header"><span class="card-title">🔐 Change Admin Password</span></div>
        <div class="card-body">
          <form onsubmit="changePass(event)">
            <div class="form-group" style="margin-bottom:16px;"><label class="form-label">Current Password</label><input type="password" class="form-control" id="curPass" required placeholder="Current password"></div>
            <div class="form-group" style="margin-bottom:16px;"><label class="form-label">New Password</label><input type="password" class="form-control" id="newPass" required placeholder="Min 8 characters" minlength="8"></div>
            <div class="form-group" style="margin-bottom:24px;"><label class="form-label">Confirm New Password</label><input type="password" class="form-control" id="confPass" required placeholder="Repeat new password"></div>
            <button type="submit" class="topbar-btn btn-primary" style="width:100%;justify-content:center;padding:11px;font-size:14px;border-radius:8px;">Update Password</button>
          </form>
          <div style="margin-top:20px;padding:14px;background:var(--gray-50);border-radius:8px;font-size:12px;color:var(--gray-500);">
            <strong>Password Requirements:</strong><br>• At least 8 characters<br>• Use a mix of letters, numbers, and symbols<br>• Avoid using your email or name
          </div>
        </div>
      </div>
    </div>`);
});
async function changePass(e){e.preventDefault();
  const cur=document.getElementById('curPass').value;
  const nw=document.getElementById('newPass').value;
  const conf=document.getElementById('confPass').value;
  if(nw!==conf){toast('Passwords do not match','error');return;}
  const r=await adminAPI('/admin/change-password',{method:'POST',body:JSON.stringify({currentPassword:cur,newPassword:nw})});
  if(r?.success){toast('Password changed successfully! Please login again.','success');setTimeout(()=>logout(),2000);}
  else toast(r?.message||'Failed to change password','error');
}
</script></body></html>
