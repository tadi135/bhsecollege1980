<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admissions | College Admin</title><link rel="stylesheet" href="css/admin.css"></head>
<body><script src="js/config.js"></script>
<script src="js/admin.js"></script><script>
let items=[];
document.addEventListener('DOMContentLoaded',async()=>{
  buildLayout('Admissions Info',`
    <div class="page-header"><h2>Manage Admissions</h2><button onclick="openAdd()" class="topbar-btn btn-primary">+ Add Course</button></div>
    <div class="card"><div class="table-wrap"><table><thead><tr><th>Course</th><th>Type</th><th>Seats</th><th>Eligibility</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody id="tbl"></tbody></table></div></div>`);
  await load();
});
async function load(){const r=await adminAPI('/admin/admissions');items=r?.data||[];render();}
function render(){document.getElementById('tbl').innerHTML=items.length?items.map(a=>`<tr>
  <td style="font-weight:600;">${a.course}</td>
  <td><span class="badge badge-blue">${a.type}</span></td>
  <td>${a.seats||'-'}</td>
  <td style="max-width:200px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a.eligibility||'-'}</td>
  <td><label class="switch"><input type="checkbox" ${a.active?'checked':''} onchange="toggleActive(${a.id},this.checked)"><span class="slider-track"></span></label></td>
  <td><div class="td-actions"><button class="btn-edit" onclick="openEdit(${a.id})">✏️</button><button class="btn-del" onclick="del(${a.id})">🗑</button></div></td>
</tr>`).join(''):'<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--gray-400);">No admissions info.</td></tr>';}
function form(a={}){return`<div class="form-grid">
  <div class="form-group"><label class="form-label">Course Name *</label><input class="form-control" id="aName" value="${a.course||''}" required></div>
  <div class="form-group"><label class="form-label">Type *</label>
    <select class="form-control" id="aType"><option value="intermediate" ${a.type==='intermediate'?'selected':''}>Intermediate</option><option value="degree" ${a.type==='degree'?'selected':''}>Degree</option></select></div>
  <div class="form-group"><label class="form-label">Seats</label><input type="number" class="form-control" id="aSeats" value="${a.seats||60}"></div>
  <div class="form-group form-full"><label class="form-label">Eligibility</label><textarea class="form-control" id="aElig" rows="2">${a.eligibility||''}</textarea></div>
  <div class="form-group form-full"><label class="form-label">Fee Structure</label><textarea class="form-control" id="aFee" rows="2">${a.fee_structure||''}</textarea></div>
  <div class="form-group form-full"><label class="form-label">Admission Process</label><textarea class="form-control" id="aProc" rows="3">${a.process||''}</textarea></div>
</div>`;}
function openAdd(){openModal('Add Admission Info',form(),async()=>{
  const d={course:document.getElementById('aName').value,type:document.getElementById('aType').value,seats:document.getElementById('aSeats').value,eligibility:document.getElementById('aElig').value,fee_structure:document.getElementById('aFee').value,process:document.getElementById('aProc').value};
  if(!d.course){toast('Course name required','error');return;}
  const r=await adminAPI('/admin/admissions',{method:'POST',body:JSON.stringify(d)});
  if(r?.success){toast('Added!','success');closeModal();await load();}else toast('Failed','error');
},'Add');}
function openEdit(id){const a=items.find(x=>x.id===id);if(!a)return;
openModal('Edit Admission',form(a),async()=>{
  const d={course:document.getElementById('aName').value,type:document.getElementById('aType').value,seats:document.getElementById('aSeats').value,eligibility:document.getElementById('aElig').value,fee_structure:document.getElementById('aFee').value,process:document.getElementById('aProc').value};
  const r=await adminAPI(`/admin/admissions/${id}`,{method:'PUT',body:JSON.stringify(d)});
  if(r?.success){toast('Updated!','success');closeModal();await load();}else toast('Failed','error');
},'Save');}
async function toggleActive(id,v){await adminAPI(`/admin/admissions/${id}`,{method:'PUT',body:JSON.stringify({active:v?1:0})});}
async function del(id){if(!await confirm('Delete?'))return;const r=await adminAPI(`/admin/admissions/${id}`,{method:'DELETE'});if(r?.success){toast('Deleted','success');await load();}else toast('Failed','error');}
</script></body></html>
